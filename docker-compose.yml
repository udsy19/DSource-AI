services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: quarry
      POSTGRES_PASSWORD: quarry
      POSTGRES_DB: quarry
    ports:
      - "5433:5432"   # 5433 on host to avoid clashing with a local Postgres on 5432
    volumes:
      - quarry_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quarry -d quarry"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  quarry_pgdata:
